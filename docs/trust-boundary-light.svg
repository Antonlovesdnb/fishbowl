<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 340" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="shadow">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="820" height="340" rx="12" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1"/>

  <text x="410" y="38" font-size="22" font-weight="800" fill="#495057" text-anchor="middle">What enters the container?</text>

  <!-- Column headers -->
  <text x="50" y="76" font-size="14" font-weight="700" fill="#868e96">CREDENTIAL</text>
  <text x="460" y="76" font-size="14" font-weight="700" fill="#868e96">HOW IT GETS IN</text>
  <text x="700" y="76" font-size="14" font-weight="700" fill="#868e96">STATUS</text>
  <line x1="30" y1="86" x2="790" y2="86" stroke="#dee2e6" stroke-width="1"/>

  <!-- Row 1: Agent auth — Auto -->
  <rect x="30" y="96" width="760" height="52" rx="6" fill="#e8f5e9" filter="url(#shadow)"/>
  <text x="50" y="118" font-size="15" font-weight="600" fill="#2e7d32">~/.codex/  ~/.claude/</text>
  <text x="50" y="138" font-size="12" fill="#558b2f">Agent auth files</text>
  <text x="460" y="126" font-size="14" fill="#2e7d32">Automatic (you chose the agent)</text>
  <rect x="692" y="106" width="88" height="30" rx="6" fill="#2e7d32"/>
  <text x="736" y="126" font-size="13" font-weight="700" fill="#fff" text-anchor="middle">AUTO</text>

  <!-- Row 2: SSH keys — Interactive -->
  <rect x="30" y="160" width="760" height="52" rx="6" fill="#fff9db" filter="url(#shadow)"/>
  <text x="50" y="182" font-size="15" font-weight="600" fill="#e67700">~/.ssh/ keys</text>
  <text x="50" y="202" font-size="12" fill="#f08c00">SSH private keys</text>
  <text x="460" y="190" font-size="14" fill="#e67700">You pick from a list at startup</text>
  <rect x="692" y="170" width="88" height="30" rx="6" fill="#e67700"/>
  <text x="736" y="190" font-size="13" font-weight="700" fill="#fff" text-anchor="middle">PROMPT</text>

  <!-- Row 3: Env vars + creds — Explicit -->
  <rect x="30" y="224" width="760" height="52" rx="6" fill="#edf2ff" filter="url(#shadow)"/>
  <text x="50" y="246" font-size="15" font-weight="600" fill="#364fc7">GH_TOKEN, API keys, credential files</text>
  <text x="50" y="266" font-size="12" fill="#5c7cfa">Env vars and host credential files</text>
  <text x="460" y="254" font-size="14" fill="#364fc7">--mount GH_TOKEN or --mount ~/file</text>
  <rect x="692" y="234" width="88" height="30" rx="6" fill="#4263eb"/>
  <text x="736" y="254" font-size="13" font-weight="700" fill="#fff" text-anchor="middle">EXPLICIT</text>

  <!-- Footer -->
  <text x="410" y="316" font-size="14" fill="#868e96" text-anchor="middle">Everything else on the host stays outside the container.</text>
</svg>
