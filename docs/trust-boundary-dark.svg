<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 340" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="shadow">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.2"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="820" height="340" rx="12" fill="#1a1b26" stroke="#33384d" stroke-width="1"/>

  <text x="410" y="38" font-size="22" font-weight="800" fill="#a9b1d6" text-anchor="middle">What enters the container?</text>

  <!-- Column headers -->
  <text x="50" y="76" font-size="14" font-weight="700" fill="#565f89">CREDENTIAL</text>
  <text x="460" y="76" font-size="14" font-weight="700" fill="#565f89">HOW IT GETS IN</text>
  <text x="700" y="76" font-size="14" font-weight="700" fill="#565f89">STATUS</text>
  <line x1="30" y1="86" x2="790" y2="86" stroke="#33384d" stroke-width="1"/>

  <!-- Row 1: Agent auth -->
  <rect x="30" y="96" width="760" height="52" rx="6" fill="#292e42" filter="url(#shadow)"/>
  <text x="50" y="118" font-size="15" font-weight="600" fill="#9ece6a">~/.codex/  ~/.claude/</text>
  <text x="50" y="138" font-size="12" fill="#565f89">Agent auth files</text>
  <text x="460" y="126" font-size="14" fill="#9ece6a">Automatic (you chose the agent)</text>
  <rect x="692" y="106" width="88" height="30" rx="6" fill="#9ece6a"/>
  <text x="736" y="126" font-size="13" font-weight="700" fill="#1a1b26" text-anchor="middle">AUTO</text>

  <!-- Row 2: SSH keys -->
  <rect x="30" y="160" width="760" height="52" rx="6" fill="#292e42" filter="url(#shadow)"/>
  <text x="50" y="182" font-size="15" font-weight="600" fill="#e0af68">~/.ssh/ keys</text>
  <text x="50" y="202" font-size="12" fill="#565f89">SSH private keys</text>
  <text x="460" y="190" font-size="14" fill="#e0af68">You pick from a list at startup</text>
  <rect x="692" y="170" width="88" height="30" rx="6" fill="#e0af68"/>
  <text x="736" y="190" font-size="13" font-weight="700" fill="#1a1b26" text-anchor="middle">PROMPT</text>

  <!-- Row 3: Env vars + creds -->
  <rect x="30" y="224" width="760" height="52" rx="6" fill="#292e42" filter="url(#shadow)"/>
  <text x="50" y="246" font-size="15" font-weight="600" fill="#7aa2f7">GH_TOKEN, API keys, credential files</text>
  <text x="50" y="266" font-size="12" fill="#565f89">Env vars and host credential files</text>
  <text x="460" y="254" font-size="14" fill="#7aa2f7">--mount GH_TOKEN or --mount ~/file</text>
  <rect x="692" y="234" width="88" height="30" rx="6" fill="#7aa2f7"/>
  <text x="736" y="254" font-size="13" font-weight="700" fill="#1a1b26" text-anchor="middle">EXPLICIT</text>

  <!-- Footer -->
  <text x="410" y="316" font-size="14" fill="#565f89" text-anchor="middle">Everything else on the host stays outside the container.</text>
</svg>
