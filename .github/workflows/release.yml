name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.1.0). Created if it does not exist.'
        required: true

permissions:
  contents: write

env:
  # Silence Node.js 20 deprecation warnings on actions/checkout, cache,
  # upload-artifact, etc. These actions still ship the Node 20 entrypoint
  # but the runner can re-run them on Node 24.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-14
          - target: x86_64-apple-darwin
            # macos-13 (Intel) was retired by GitHub. Cross-compile from the
            # arm64 macos-14 runner — Apple's toolchain handles this natively
            # and AgentFence has no native deps that would complicate it.
            runner: macos-14
          - target: x86_64-unknown-linux-musl
            runner: ubuntu-latest
            apt_packages: musl-tools
          - target: aarch64-unknown-linux-musl
            runner: ubuntu-24.04-arm
            apt_packages: musl-tools
    steps:
      - uses: actions/checkout@v4

      - name: Install apt packages
        if: matrix.apt_packages != ''
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.apt_packages }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('Cargo.lock') }}

      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package
        id: package
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ github.event.inputs.tag || github.ref_name }}"
          NAME="agentfence-${VERSION}-${{ matrix.target }}"
          mkdir -p "dist/${NAME}"
          cp "target/${{ matrix.target }}/release/agentfence" "dist/${NAME}/"
          cp README.md AgentFence.md "dist/${NAME}/" 2>/dev/null || true
          tar -czf "dist/${NAME}.tar.gz" -C dist "${NAME}"
          rm -rf "dist/${NAME}"
          echo "archive=dist/${NAME}.tar.gz" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: agentfence-${{ matrix.target }}
          path: ${{ steps.package.outputs.archive }}
          if-no-files-found: error
          retention-days: 7

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate SHA256SUMS
        run: |
          set -euo pipefail
          cd artifacts
          sha256sum *.tar.gz > SHA256SUMS
          cat SHA256SUMS

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: |
            artifacts/*.tar.gz
            artifacts/SHA256SUMS
          generate_release_notes: true
          fail_on_unmatched_files: true
